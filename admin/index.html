<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SOIL Admin</title>
    <link rel="icon" href="../assets/soil-logo-mark.png" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <main class="admin-shell">
      <section class="login-card" data-login-panel>
        <img src="../assets/soil-logo-web.png" alt="SOIL" />
        <h1>SOIL Admin</h1>
        <p>Enter admin password to update website headings and pictures.</p>
        <form data-login-form>
          <label>
            Password
            <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required />
          </label>
          <button type="submit">Login</button>
          <span class="status" data-login-status></span>
        </form>
      </section>

      <section class="editor" data-editor hidden>
        <header class="editor-header">
          <div>
            <img src="../assets/soil-logo-web.png" alt="SOIL" />
            <p>Website Content Editor</p>
          </div>
          <div class="editor-actions">
            <button type="button" class="ghost" data-refresh>Refresh</button>
            <button type="button" data-save>Save Changes</button>
          </div>
        </header>
        <p class="status editor-status" data-editor-status></p>
        <div class="form-grid" data-fields></div>
      </section>
    </main>
    <script src="admin.js"></script>
  </body>
</html>
